name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build_and_release:
    runs-on: windows-2022

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.8.3'
        host: 'windows'
        target: 'desktop'
        arch: 'win64_msvc2022_64'
        cache: 'true'

    - name: Configure CMake
      run: cmake -G "Visual Studio 17 2022" -A x64 -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="${{ env.Qt6_DIR }}"

    - name: Build Project
      run: cmake --build build --config Release

    - name: Run Automated Tests
      run: powershell -ExecutionPolicy Bypass -File tests\run_tests.ps1 -SkipBuild

    - name: Package Release
      run: powershell -ExecutionPolicy Bypass -File scripts\package_release.ps1 -Version ${{ github.ref_name }}

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: dist/MidiUmpAnalyzer-${{ github.ref_name }}-windows-x64.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
